version: '3.8'

services:
  # Spring Boot 백엔드
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mechuragi-server-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Docker 내부 네트워크의 MySQL 컨테이너 이름(mysql) 사용
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Nginx 웹서버
  nginx:
    image: nginx:alpine
    container_name: mechuragi-server-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - spring-app
    restart: unless-stopped
    networks:
      - app-network

  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: mechuragi-server-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    # 로컬 MySQL과 충돌 방지를 위해 포트 매핑 제거
    # 필요시 다른 포트 사용: "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - app-network

  # Redis 캐시
  redis:
    image: redis:alpine
    container_name: mechuragi-server-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 500mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: