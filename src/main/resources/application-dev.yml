server:
  port: 8080
  address: 0.0.0.0  # 모든 네트워크 인터페이스에서 접속 허용

spring:
  config:
    activate:
      on-profile: dev
    import: optional:file:.env.dev
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME:mechuragi_user}
    password: ${DB_PASSWORD:mechuragi_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI} # 카카오 → 백엔드
            authorization-grant-type: authorization_code # OAuth2 인증 방식 지정
            client-authentication-method: client_secret_post # 클라이언트 인증 방식
            client-name: Kakao
            scope:
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}  # 24시간 (밀리초)

oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI} #백엔드에서 프론트엔드로 토큰 전달

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

cloud:
  aws:
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${S3_BUCKET}
    ses:
      from-email: ${SES_FROM_EMAIL}

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8082}

http:
  client:
    connection-timeout: 5000  # 5초
    read-timeout: 60000       # 60초

logging:
  level:
    root: INFO
    com.mechuragi.mechuragi_server: DEBUG  # 애플리케이션 전체 디버그 로그
    org.springframework.web: DEBUG  # Spring MVC 요청/응답 로그
    org.springframework.security: DEBUG  # Spring Security 로그
    org.hibernate.SQL: DEBUG  # SQL 쿼리 로그
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # SQL 파라미터 로그
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mechuragi-dev.log  # 로그 파일 경로
    max-size: 10MB
    max-history: 30