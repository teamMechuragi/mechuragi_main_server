spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mechuragi_local
    username: username
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:mySecretKey}

logging:
  level:
    com.mechuragi.mechuragi_server: DEBUG