spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mechuragi_db}
    username: ${DB_USERNAME:mechuragi_user}
    password: ${DB_PASSWORD:mechuragi_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:mySecretKey}

logging:
  level:
    com.mechuragi.mechuragi_server: DEBUG