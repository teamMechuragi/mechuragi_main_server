server:
  port: 8080
  tomcat:
    threads:
      max: 32  # 저사양 EC2 스레드풀 고갈 시뮬레이션 (부하 테스트용)

spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mechuragi_db}
    username: ${DB_USERNAME:mechuragi_user}
    password: ${DB_PASSWORD:mechuragi_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      cache-null-values: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: false  # 로컬 환경에서는 Flyway 비활성화, JPA가 스키마 관리
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI} # 카카오 → 백엔드
            authorization-grant-type: authorization_code # OAuth2 인증 방식 지정
            client-authentication-method: client_secret_post # 클라이언트 인증 방식
            client-name: Kakao
            scope:
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}


oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${S3_BUCKET:mechuragi-dev-images}
    cloudfront:
      domain: ${APP_DOMAIN:localhost:8080}
    ses:
      from-email: ${SES_FROM_EMAIL:mechuragi001@gmail.com}

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8082}

app:
  domain: ${APP_DOMAIN:localhost:8080}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

logging:
  level:
    com.mechuragi.mechuragi_server: DEBUG

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:mechuragi-server}