name: Deploy Main Service to EC2
on:
  push:
    branches: [ main, dev ]
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew build -x test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'

    steps:
      - name: Send Discord Notification - Deploy Start
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🚀 메인 서비스 배포 시작"
          description: |
            **메인 서비스 배포가 시작되었습니다**
            • 커밋: `${{ github.event.head_commit.message }}`
            • 브랜치: `${{ github.ref_name }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
          color: 0xffaa00

      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build application
        run: ./gradlew clean build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload docker-compose.prod.yml to server via Bastion
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MAIN_SERVER_PRIVATE_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.NGINX_GATEWAY_PUBLIC_IP }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/app/"
          timeout: 120s
          command_timeout: 10m
          proxy_timeout: 120s

      - name: Deploy to Main Server with Blue-Green Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        with:
          host: ${{ secrets.MAIN_SERVER_PRIVATE_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.NGINX_GATEWAY_PUBLIC_IP }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          command_timeout: 20m
          debug: true
          envs: SSH_PRIVATE_KEY
          script: |
            # ========================================
            # 0단계: SSH Key 준비 (Nginx Gateway 접속용)
            # ========================================
            echo "🔑 SSH key 설정 중..."
            echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key.pem
            chmod 600 /tmp/deploy_key.pem

            # ========================================
            # 1단계: 환경 설정 및 새 컨테이너 배포
            # ========================================
            cd /home/ubuntu/app

            echo "📦 배포 파일 확인 중..."
            ls -la docker-compose.prod.yml

            # .env 파일 생성 (컨테이너 재시작 시에도 환경 변수 유지)
            echo "🔧 .env 파일 생성 중..."
            cat > .env << 'ENV_EOF'
            # Database
            DB_HOST=mysql
            DB_PORT=3306
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}

            # Redis
            REDIS_HOST=redis
            REDIS_PORT=6379

            # JWT
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}

            # AWS
            AWS_REGION=${{ secrets.AWS_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}

            # OAuth2
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
            OAUTH2_REDIRECT_URI=${{ secrets.OAUTH2_REDIRECT_URI }}

            # Services
            AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            ENV_EOF

            echo "✅ .env 파일 생성 완료"

            # 최신 이미지 풀
            echo "🐳 최신 Docker 이미지 다운로드 중..."
            IMAGE_TAG="${{ github.sha }}"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-app:$IMAGE_TAG

            # 현재 활성 컨테이너 확인 (Main Server 기준 - Single Source of Truth)
            if docker ps | grep -q "mechuragi-main-blue"; then
              CURRENT="blue"
              TARGET="green"
              CURRENT_PORT=8080
              TARGET_PORT=8081
            else
              CURRENT="green"
              TARGET="blue"
              CURRENT_PORT=8081
              TARGET_PORT=8080
            fi

            echo "📊 현재 활성: $CURRENT (포트 $CURRENT_PORT)"
            echo "📊 배포 대상: $TARGET (포트 $TARGET_PORT)"

            # Target 컨테이너 시작
            echo "🚀 $TARGET 컨테이너 시작 중..."
            if [ "$TARGET" = "green" ]; then
              docker compose -f docker-compose.prod.yml up -d mechuragi-main-green --no-deps
            else
              docker compose -f docker-compose.prod.yml up -d mechuragi-main-blue --no-deps
            fi

            # 새 컨테이너 헬스체크 대기 (최대 2분)
            echo "🏥 $TARGET 컨테이너 헬스체크 대기 중..."
            for i in {1..24}; do
              if curl -f http://localhost:$TARGET_PORT/actuator/health > /dev/null 2>&1; then
                echo "✅ $TARGET 컨테이너 정상 시작 확인"
                break
              fi
              if [ $i -eq 24 ]; then
                echo "❌ 헬스체크 실패 - 컨테이너 로그:"
                docker compose -f docker-compose.prod.yml logs --tail=50 mechuragi-main-$TARGET
                exit 1
              fi
              echo "⏳ 대기 중... ($i/24)"
              sleep 5
            done

            # ========================================
            # 2단계: Nginx 트래픽 전환
            # ========================================
            echo ""
            echo "🔄 Nginx 트래픽 전환 시작..."

            # Nginx Gateway로 SSH 접속하여 트래픽 전환
            MAIN_SERVER_IP="${{ secrets.MAIN_SERVER_PRIVATE_IP }}"
            NGINX_GATEWAY="${{ secrets.NGINX_GATEWAY_PRIVATE_IP }}"

            ssh -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no ubuntu@$NGINX_GATEWAY << EOF
              # Nginx 설정 파일 백업
              sudo cp /usr/local/openresty/nginx/conf/nginx.conf /usr/local/openresty/nginx/conf/nginx.conf.backup

              # upstream 포트를 TARGET_PORT로 변경
              echo "🔧 Nginx upstream을 $TARGET_PORT로 변경 중..."
              sudo sed -i "s|server $MAIN_SERVER_IP:[0-9]*;|server $MAIN_SERVER_IP:$TARGET_PORT;|" /usr/local/openresty/nginx/conf/nginx.conf

              # 설정 파일 검증
              echo "✔️  Nginx 설정 검증 중..."
              sudo /usr/local/openresty/nginx/sbin/nginx -t

              # Nginx 리로드 (무중단)
              echo "🔄 Nginx 리로드 중..."
              sudo /usr/local/openresty/nginx/sbin/nginx -s reload

              echo "✅ Nginx 트래픽이 $TARGET($TARGET_PORT)로 전환되었습니다"

              # 트래픽 전환 후 헬스체크 확인
              sleep 3
              if curl -f http://localhost/actuator/health > /dev/null 2>&1; then
                echo "✅ Nginx를 통한 헬스체크 성공"
              else
                echo "❌ Nginx를 통한 헬스체크 실패 - 롤백 필요"
                exit 1
              fi
            EOF

            if [ $? -ne 0 ]; then
              echo "❌ Nginx 트래픽 전환 실패"
              exit 1
            fi

            # ========================================
            # 3단계: 이전 컨테이너 정리
            # ========================================
            echo ""
            echo "🧹 이전 컨테이너 정리 중..."

            # 5초 대기 (트래픽이 완전히 전환되도록)
            sleep 5

            # 이전 컨테이너 중지 및 제거
            if [ "$CURRENT" = "blue" ]; then
              echo "🛑 Blue 컨테이너 중지 중..."
              docker compose -f docker-compose.prod.yml stop mechuragi-main-blue
              docker compose -f docker-compose.prod.yml rm -f mechuragi-main-blue
            else
              echo "🛑 Green 컨테이너 중지 중..."
              docker compose -f docker-compose.prod.yml stop mechuragi-main-green
              docker compose -f docker-compose.prod.yml rm -f mechuragi-main-green
            fi

            echo "✅ 이전 컨테이너 정리 완료"

            # ========================================
            # 배포 완료
            # ========================================
            echo ""
            echo "🎉 Blue-Green 배포 완료!"
            echo "   • 이전 버전: $CURRENT ($CURRENT_PORT) → 중지됨"
            echo "   • 새 버전: $TARGET ($TARGET_PORT) → 활성화"

            # SSH Key 정리
            echo "🧹 SSH key 정리 중..."
            rm -f /tmp/deploy_key.pem

      - name: Send Discord Notification - Deploy Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "Success"
          title: "✅ 메인 서비스 배포 성공"
          description: |
            **메인 서비스가 성공적으로 배포되었습니다**
            • 서버: Main Service Server:8080
            • 배포 방식: Docker 컨테이너 배포
            • 커밋: `${{ github.event.head_commit.message }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
            • 브랜치: `${{ github.ref_name }}`
          color: 0x00ff00

      - name: Send Discord Notification - Deploy Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "Failure"
          title: "❌ 메인 서비스 배포 실패"
          description: |
            **메인 서비스 배포가 실패했습니다**
            • 오류 단계: ${{ job.status }}
            • 커밋: `${{ github.event.head_commit.message }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
            • 브랜치: ${{ github.ref_name }}
            • 로그 확인: [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: 0xff0000
