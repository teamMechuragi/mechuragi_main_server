name: Deploy to EC2
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main , dev ]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew build -x test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Send Discord Notification - Deploy Start
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🚀 배포 시작"
          description: |
            **메인 서비스 배포가 시작되었습니다**
            • 커밋: `${{ github.event.head_commit.message }}`
            • 브랜치: `${{ github.ref_name }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
          color: 0xffaa00
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build application
        run: ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Main Server (Blue-Green)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.MAIN_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 애플리케이션 디렉토리로 이동
            cd /home/ubuntu/app

            # Docker Compose 설정 확인 (파일은 서버에 업로드됨)
            echo "블루-그린 배포 파일 확인 중..."
            ls -la docker-compose.blue-green.yml nginx/blue-green.conf scripts/blue-green-deploy.sh || echo "일부 파일이 없을 수 있음 (정상)"

            # 스크립트 실행 권한 부여
            chmod +x scripts/blue-green-deploy.sh
            
            # 환경 변수 설정
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_PORT="${{ secrets.DB_PORT }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export REDIS_HOST="${{ secrets.REDIS_HOST }}"
            export REDIS_PORT="${{ secrets.REDIS_PORT }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export S3_BUCKET="${{ secrets.S3_BUCKET }}"
            export SES_FROM_EMAIL="${{ secrets.SES_FROM_EMAIL }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export BEDROCK_AI_HOST="${{ secrets.BEDROCK_AI_HOST }}"
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

            # 최신 이미지 풀
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-app:latest

            # Blue-Green 배포 실행
            ./scripts/blue-green-deploy.sh

            # 최종 헬스체크
            sleep 10
            curl -f http://localhost/actuator/health || exit 1

      - name: Send Discord Notification - Deploy Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "Success"
          title: "✅ 배포 성공"
          description: |
            **메인 서비스가 성공적으로 배포되었습니다**
            • 서버: Main Service Server
            • 배포 방식: Blue-Green 무중단 배포
            • 커밋: `${{ github.event.head_commit.message }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
            • 배포 시간: ${{ job.started_at }}
          color: 0x00ff00

      - name: Send Discord Notification - Deploy Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "Failure"
          title: "❌ 배포 실패"
          description: |
            **메인 서비스 배포가 실패했습니다**
            • 오류 단계: ${{ job.status }}
            • 커밋: `${{ github.event.head_commit.message }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
            • 로그 확인: [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: 0xff0000