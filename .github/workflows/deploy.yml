name: Deploy Main Service to EC2
on:
  push:
    branches: [ main, dev ]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew build -x test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'

    steps:
      - name: Send Discord Notification - Deploy Start
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🚀 메인 서비스 배포 시작"
          description: |
            **메인 서비스 배포가 시작되었습니다**
            • 커밋: `${{ github.event.head_commit.message }}`
            • 브랜치: `${{ github.ref_name }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
          color: 0xffaa00

      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build application
        run: ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-main-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Main Server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.MAIN_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-main-server:latest

            # Stop and remove existing container (ignore errors if not exists)
            sudo docker stop mechuragi-main-server 2>/dev/null || echo "Container not running, skipping stop"
            sudo docker rm mechuragi-main-server 2>/dev/null || echo "Container not found, skipping removal"

            # Run new container with environment variables and IAM role access
            sudo docker run -d \
              -p 8080:8080 \
              --name mechuragi-main-server \
              --restart unless-stopped \
              -e "SPRING_PROFILES_ACTIVE=dev" \
              -e "DB_HOST=${{ secrets.DB_HOST }}" \
              -e "DB_PORT=${{ secrets.DB_PORT }}" \
              -e "DB_NAME=${{ secrets.DB_NAME }}" \
              -e "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              -e "REDIS_HOST=${{ secrets.REDIS_HOST }}" \
              -e "REDIS_PORT=${{ secrets.REDIS_PORT }}" \
              -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              -e "S3_BUCKET=${{ secrets.S3_BUCKET }}" \
              -e "AWS_REGION=${{ secrets.AWS_REGION }}" \
              -e "SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}" \
              -e "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" \
              -e "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" \
              -e "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}" \
              -e "OAUTH2_REDIRECT_URI=${{ secrets.OAUTH2_REDIRECT_URI }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/mechuragi-main-server:latest

            # Wait for application to start
            sleep 45

            # Health check (up to 5 attempts)
            for i in {1..5}; do
              if curl -f http://localhost:8080/actuator/health; then
                echo "Health check passed"
                break
              else
                echo "Health check failed ($i/5), retrying in 10 seconds..."
                sleep 10
                if [ $i -eq 5 ]; then
                  echo "Health check final failure, showing logs:"
                  sudo docker logs mechuragi-main-server
                  exit 1
                fi
              fi
            done

            # Clean up old images
            sudo docker image prune -f

      - name: Send Discord Notification - Deploy Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "Success"
          title: "✅ 메인 서비스 배포 성공"
          description: |
            **메인 서비스가 성공적으로 배포되었습니다**
            • 서버: Main Service Server:8080
            • 배포 방식: Docker 컨테이너 배포
            • 커밋: `${{ github.event.head_commit.message }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
            • 브랜치: `${{ github.ref_name }}`
          color: 0x00ff00

      - name: Send Discord Notification - Deploy Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "Failure"
          title: "❌ 메인 서비스 배포 실패"
          description: |
            **메인 서비스 배포가 실패했습니다**
            • 오류 단계: ${{ job.status }}
            • 커밋: `${{ github.event.head_commit.message }}`
            • 작성자: ${{ github.event.head_commit.author.name }}
            • 브랜치: ${{ github.ref_name }}
            • 로그 확인: [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: 0xff0000
