version: '3.8'

services:
  # Spring Boot 메인 서비스 - Blue 버전
  mechuragi-main-blue:
    image: ${DOCKERHUB_USERNAME}/mechuragi-app:latest
    container_name: mechuragi-main-blue
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=${REDIS_HOST}
      - SPRING_REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      - BEDROCK_AI_HOST=${BEDROCK_AI_HOST}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Spring Boot 메인 서비스 - Green 버전 (배포 시에만 사용)
  mechuragi-main-green:
    image: ${DOCKERHUB_USERNAME}/mechuragi-app:latest
    container_name: mechuragi-main-green
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=${REDIS_HOST}
      - SPRING_REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      - BEDROCK_AI_HOST=${BEDROCK_AI_HOST}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # profiles: ["deploy"]  # 블루-그린 배포에서는 프로파일 사용하지 않음

  # Nginx는 호스트에서 직접 실행 (Ansible로 관리)

networks:
  app-network:
    driver: bridge